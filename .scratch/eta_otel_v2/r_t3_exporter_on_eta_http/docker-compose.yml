services:
  otelcol:
    image: otel/opentelemetry-collector-contrib:0.127.0
    command: ["--config=/etc/otelcol/config.yaml"]
    ports:
      - "${OTEL_PORT:-4318}:4318"
    environment:
      ETA_R_T3_TRACE_FILE: /tmp/otel-output/traces.json
    volumes:
      - ./otelcol-config.yaml:/etc/otelcol/config.yaml:ro
      - ./out:/tmp/otel-output
