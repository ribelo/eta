name: H3 hardening

on:
  pull_request:
    paths:
      - "packages/eta/runtime.ml"
      - "packages/eta/runtime.mli"
      - "packages/eta/schedule.ml"
      - "packages/eta/schedule.mli"
      - "packages/eta/capabilities.ml"
      - "packages/eta/capabilities.mli"
      - "packages/eta/supervisor.ml"
      - "packages/eta/supervisor.mli"
      - "packages/eta-stream/**"
      - "packages/eta-otel/**"
      - "scratch/oxcaml_research/concurrency_model/**"
      - ".github/workflows/h3-hardening.yml"
      - ".github/pull_request_template.md"

jobs:
  h3-hardening:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v15
      - name: Reject ambient jitter random
        run: nix develop -c bash -lc 'if rg "Random\\." packages/eta/schedule.ml packages/eta/runtime.ml packages/eta/capabilities.ml; then exit 1; fi'
      - name: Run H3 hardening gate
        run: nix develop -c bash scratch/oxcaml_research/concurrency_model/h3_hardening/run.sh
      - name: Run H3 caveat probes
        run: nix develop -c bash scratch/oxcaml_research/concurrency_model/h3_caveats/run.sh
